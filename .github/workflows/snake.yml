name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake-${{ github.repository }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Gerar cobrinha a partir do grid de contribuições
        uses: Platane/snk@v3
        with:
          github_user_name: gabrieldefende
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-dark.gif?palette=github-dark

      - name: Gravar SVG e GIF na raiz do repositório (branch main)
        run: |
          set -e
          cp dist/github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.svg
          cp dist/github-contribution-grid-snake-dark.gif github-contribution-grid-snake-dark.gif
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake-dark.svg github-contribution-grid-snake-dark.gif
          if git diff --staged --quiet; then
            echo "Nenhuma alteração na cobrinha."
            exit 0
          fi
          git commit -m "chore: atualiza animação da cobrinha"
          git pull --rebase origin main
          git push
